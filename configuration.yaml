notify: # https://www.home-assistant.io/integrations/file/

  - name: power_data
    platform: file
    filename: power.csv
    # timestamp: true
    services:

  - name: energy_data
    platform: file
    filename: energy.csv

  - name: battery_data  # used for high-level battery status logging by situation automation
    platform: file
    filename: battery.csv

  - name: profile_data
    platform: file
    filename: profile.csv

shell_command: # https://www.home-assistant.io/integrations/shell_command/  "When using templates, shell_command runs in a more secure environment ..."
# changes require HA restart, otherwise:  Error executing script. Service not found for call_service at pos N: Unable to find service shell_command.XYZ

# https://community.home-assistant.io/t/file-notification-component-any-way-to-dynamically-create-file-name/113062/11
  rename_power_by_date:   "mv -n power.csv   {{ (as_timestamp(now()) - 60) | timestamp_custom('power_%Y-%m-%d.csv') }}"
  rename_energy_by_year:  "mv -n energy.csv  {{ (as_timestamp(now()) - 60) | timestamp_custom('energy_%Y.csv') }}"
  rename_battery_by_year: "mv -n battery.csv {{ (as_timestamp(now()) - 60) | timestamp_custom('battery_%Y.csv') }}"
  rename_profile_by_year: "mv -n profile.csv {{ (as_timestamp(now()) - 60) | timestamp_custom('profile_%Y.csv') }}"

# failed attempts to append msg to profile without line break (newline) at msg end:
# append_to_profile:       echo -n >>profile.csv msg  # does nothing if 'msg' is replaced by parameter '{{msg}}'
# append_to_profile:       touch {{msg}}.csv          # test command - this correctly expands '{{msg}}' to 'test'

# automation: !include automations.yaml
automation:

  # at the end of each day, split and name power output file per day
  - id: run_rename_power_by_date
    initial_state: true
    trigger:
      - platform: time
        at: '23:59:59'
    action:
      - service: shell_command.rename_power_by_date

  # at the end of each year, split and name energy output file per year
  - id: run_rename_energy_by_year
    initial_state: true
    trigger:
      - platform: time
        at: '23:59:59'
    condition:
      - condition: template
        value_template: "{{ now().month == 12 and now().day == 31 }}"
    action:
      - service: shell_command.rename_energy_by_year

  # at the end of each year, split and name battery output file per year
  - id: run_rename_battery_by_year
    initial_state: true
    trigger:
      - platform: time
        at: '23:59:59'
    condition:
      - condition: template
        value_template: "{{ now().month == 12 and now().day == 31 }}"
    action:
      - service: shell_command.rename_battery_by_year

  # at the end of each year, split and name profile output file per year
  - id: run_rename_profile_by_year
    initial_state: true
    trigger:
      - platform: time
        at: '23:59:59'
    condition:
      - condition: template
        value_template: "{{ now().month == 12 and now().day == 31 }}"
    action:
      - service: shell_command.rename_profile_by_year


  # generate state output per second with power consumption, production, charge, discharge, and per each of the three phases
  - id: power_data_to_file
    initial_state: true
    trigger:
      - platform: time_pattern
        seconds: "/1"
    action:
      - variables: # https://www.home-assistant.io/docs/scripts/#variables
          time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          prod: "{{ states('sensor.power_production'         ) }}"
          chrg: "{{ states('sensor.power_charge'             ) }}"
          disc: "{{ states('sensor.power_discharge'          ) }}"
          powA: "{{ states('sensor.shelly3em_channel_a_power') }}"
          powB: "{{ states('sensor.shelly3em_channel_b_power') }}"
          powC: "{{ states('sensor.shelly3em_channel_c_power') }}"
        # not using 'bal' nor 'con' in order to (partially) avoid inconsistencies with earlier values of powA/powB/powC
        # bal : "{{ states('sensor.power_balance'            ) }}"
        # con : "{{ states('sensor.power_consumption'        ) }}"
          balance: "{{ powA|float(0) + powB|float(0) + powC|float(0)           }}"
          cons   : "{{ balance + prod|float(0) - chrg|float(0) + disc|float(0) }}"
          unav: "{{ not is_number(powA) or not is_number(powB) or not is_number(powC) }}"
      # warn on unavailable per-channel power values
      - if: "{{ unav }}"
        then:
          # https://www.home-assistant.io/integrations/system_log/
          - service: system_log.write
            data:
              message: "{{ 'per-channel value(s) of power_balance not available:' }} {{ powA }} {{ powB }} {{ powC }}"
              logger: home
              level: warning
      # warn on consumption appearing non-positive (typically when charging bounced up while balance has not been updated yet)
      - if: "{{ not unav and cons <= 0 }}"
        then:
          - service: system_log.write
            data:
              message: "{{ 'power_consumption is not positive:' }} {{ cons }}"
              logger: home
              level: warning
      - service: notify.power_data
        data_template: # time zone: %z
          message: "{{ '%s,%7.2f,%s,%s,%s,%7.2f,%7.2f,%7.2f,%s' %
                       (time, '    ?  ' if unav else cons,
                        ('%5.1f' % prod if prod != 0 else '    0') if is_number(prod) else '  ?  ',
                        ('%5.1f' % chrg if chrg != 0 else '    0') if is_number(chrg) else '  ?  ',
                        ('%5.1f' % disc if disc != 0 else '    0') if is_number(disc) else '  ?  ',
                        powA, powB, powC,
                        'per-channel powers unavailable' if unav else 'consumption non-positive' if cons <= 0 else '') }}"
      - variables:
          volt        : "{{ states('sensor.battery_voltage'           )          }}"
          soc         : "{{ states('sensor.battery_soc'               )          }}"
          volt_at_rest: "{{ states('input_number.last_voltage_at_rest')|float(0) }}"
          soc_at_rest : "{{ states('input_number.last_soc_at_rest'    )|float(0) }}"
          batt_status : "{{ '%s,%s,%s' %
                            ('%4.1f' % volt if is_number(volt) else ' ?  ',
                             '%4.1f' % soc  if is_number(soc ) else ' ?  ',
                             'charging' if is_number(chrg) and chrg != 0 else
                             'disc_ing' if is_number(disc) and disc != 0 else
                             ' at rest' if volt|float(-1) == volt_at_rest and
                                           soc |float(-1) ==  soc_at_rest else
                            'previously at rest: %.1f V %.1f %%' % (volt_at_rest, soc_at_rest)) }}"
      - service: input_text.set_value
        data:
          entity_id: input_text.battery_status
          value: "{{ batt_status }}"

      - variables:
          target_charge: "{{ states('input_number.target_charge'   )|int(10) }}"
          target_dischg: "{{ states('input_number.target_discharge')|int(20) }}"
      - service: light.turn_on
        target:
          entity_id: light.power_import
        data:
          brightness_pct: "{{ min(100, max(0, (balance - target_dischg) * 100 / 200)) }}"
          # rgb_color: [ 255, 0, 0 ]  # is ignored for icon color
          # rgb_color: [ 255 if balance < 0 else 0, 0, 255 if balance >= 0 else 0]
      - service: light.turn_on
        target:
          entity_id: light.power_export
        data:
          brightness_pct: "{{ min(100, max(0, (target_charge - balance) * 100 / 200)) }}"

  # generate statistics output per hour with energy consumption, production, charge, discharge, own use, balance, import, and export
  - id: energy_data_to_file
    trigger:
      - platform: time_pattern
        minutes: 59
        seconds: 59
    action:
      - variables:
          time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          cons: "{{ 1000 * states('sensor.energy_consumption_hourly')|float }}"
          prod: "{{ 1000 * states('sensor.energy_production_hourly' )|float }}"
          own:  "{{ 1000 * states('sensor.energy_own_use_hourly'    )|float }}"
          bal:  "{{ 1000 * states('sensor.energy_balance_hourly'    )|float }}"
          imp:  "{{ 1000 * states('sensor.energy_import_hourly'     )|float }}"
          exp:  "{{ 1000 * states('sensor.energy_export_hourly'     )|float }}"
          # unavailable values of above variables intentionally lead to missing output line

          chrg: "{{ 1000 * states('sensor.energy_charge_hourly'     )|float }}"
          disc: "{{ 1000 * states('sensor.energy_discharge_hourly'  )|float }}"
          volt   : "{{ states('sensor.battery_voltage') }}"
          soc    : "{{ states('sensor.battery_soc')     }}"
      - service: notify.energy_data
        data_template:
          message: "{{ '%s,%4d,%4d,%4d,%4d,%4d,%4d%s' %
                       (time, cons, prod, own, bal, imp, exp,
                        ',%s,%s,%s' % (
                          '%4d'   % chrg if is_number(chrg) else '   ?',
                          '%4d'   % disc if is_number(disc) else '   ?',
                          states('input_text.battery_status'))
                        if is_number(chrg) or is_number(disc) or is_number(volt) else '') }}"

  # generate load and PV profile with one line per minute containing average power values (W)
  - id: profile_data_to_file
    initial_state: true
    trigger:
      - platform: time_pattern
        seconds: 59
#       seconds: '*'
    action:
# failed attempts to append msg to profile without line break (newline) at msg end:
#     - service: shell_command.append_to_profile
#       data:
#         msg: "{{ 'test' }}"
      - variables:
          time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          cons: "{{ states('sensor.energy_consumption_minutely') }}"
          prod: "{{ states('sensor.energy_production_minutely' ) }}"
      # unavailable consumption value intentionally leads to missing output line
      - condition: "{{ is_number(cons) }}"
      - service: notify.profile_data
        data_template:
          message: "{{ time }},{{ '%7.2f' % (cons / 60) }},{{
                                  '%7.2f' % (prod / 60) if is_number(prod) else '      ?' }}"

  - id: update_power_balance_avg2
    initial_state: true
    trigger:
      - platform: time_pattern
        seconds: "/1"
    action:
      # upward rolling average over 2 seconds, used to smoothen peaks in particular on fridge compressor startup
      # https://community.home-assistant.io/t/input-number-moving-average-calculation/453728/1
      # value of platform: statistics would be often 'Unknown' and does not really provide rolling average
      - variables:
          samples: "{{ 2 }}"
          prev   : "{{ states('input_number.power_balance_avg2') }}"
          curr   : "{{ states('sensor.power_balance')| float(0) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.power_balance_avg2
        data:
          value: "{{ (curr if curr < prev else (prev * (samples-1) + curr) / samples)| round(0) }}"

  - id: update_power_balance_avg
    initial_state: true
    trigger:
      - platform: time_pattern
        seconds: "/1"
    action:
      # upward rolling average over 3 seconds, used to smoothen peaks in particular on fridge compressor startup
      # https://community.home-assistant.io/t/input-number-moving-average-calculation/453728/1
      # value of platform: statistics would be often 'Unknown' and does not really provide rolling average
      - variables:
          samples: "{{ 3 }}"
          prev   : "{{ states('input_number.power_balance_avg') }}"
          curr   : "{{ states('sensor.power_balance')| float(0) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.power_balance_avg
        data:
          value: "{{ (curr if curr < prev else (prev * (samples-1) + curr) / samples)| round(0) }}"

  # control battery charging with the goal that exactly any excess power is used for this
  # would be nice, but can only switch on and off: https://edistechlab.com/ein-thermostat-in-home-assistant-erstellen/?v=3a52f3c22ed6
  - id: control_battery_charging
    initial_state: true
    trigger:
      - platform: time_pattern
        seconds: "/4" # should not go below 2 seconds due to delays in charge control and feedback (mostly power_balance), which would lead to overshooting
    action:
      - variables:
          voltage   : "{{ states('sensor.battery_voltage') }}"
          # better not rely on charger switching off at maximum voltage
          full_batt : "{{ voltage|float(99) >= states('input_number.full_batt_v')|float
                          and is_number(states('sensor.power_charge')) }}"  # TODO improve further to fully prevent hickup on quick reload where voltage may not yet be available
          # if voltage not available (happens also on quick relaod) and charging sensor is available, assume full battery, to be on safe side
          empty_batt: "{{ voltage|float(100) < states('input_number.empty_batt_v')|float }}"  # if voltage not available, assume no emergency
          # after charging to some target voltage, voltage drops, then battery is charged further where voltage increases quickly again, etc.
          threshold : "{{ 2 }}"
          cons:     "{{ states('sensor.power_consumption'    ) }}"
          balance:  "{{ states('input_number.power_balance_avg2') }}"  # should not use power_balance_avg because feedback would be too slow (3 seconds)
          chg_pow:  "{{ states('sensor.power_charge_unstable') }}"
      - condition: "{{ is_number(balance) and states('switch.test_switch') != 'unavailable' and
                       is_number(chg_pow) }}"  # beware: after quick reload, it can take 30+ seconds for chg_pow to recover from 'unknown'
      - variables:
          charging: "{{ chg_pow >= threshold }}"
          disc_ing: "{{ states('sensor.power_discharge' )|float(1) >= threshold }}"
          target:   "{{ states('input_number.target_charge') }}"
          tgtPower: "{{ chg_pow + target - balance }}"
          min_rate: "{{  61 }}"  # min usable value, with efficiency of about 86%
          min_pow:  "{{  33 }}"  # power at min_rate
          min_grad: "{{ 0.6 }}"  # gradient at min_rate
          max_rate: "{{ 255 }}"  # with rate 217, efficiency is about 95%
          lin_delta: "{{ ((target - balance) * (
                         min_grad if tgtPower < 90 else 0.4 if tgtPower < 150 else
                         0.3 if tgtPower < 300 else 0.2)) | int }}"  # used only for adaptation; higher values may lead to overshooting
          old_chg:  "{{ states.light.charge_control.attributes.brightness|float(0) }}"  # may otherwise be 'None' when swiched off
          old_rate: "{{ old_chg if charging else min_rate - min_grad * min_pow }}"
          max_delta: "{{ (max_rate - min_rate) / 1 }}"
          delta:    "{{ max(-max_delta, min(max_delta, lin_delta)) }}"

          # direct approach, based on last charge power
          dir_rate: >  # map tgtPower directly to rate
            {% set map = [
                { "power": min_pow, "rate":  min_rate },
                { "power":  35, "rate":  66 },
                { "power":  41, "rate":  77 },
                { "power":  49, "rate":  92 },
                { "power":  56, "rate":  97 },
                { "power":  65, "rate": 107 },
                { "power":  75, "rate": 117 },
                { "power":  81, "rate": 122 },
                { "power":  91, "rate": 128 },
                { "power": 110, "rate": 140 },
                { "power": 134, "rate": 153 },
                { "power": 163, "rate": 166 },
                { "power": 194, "rate": 179 },
                { "power": 232, "rate": 193 },
                { "power": 275, "rate": 204 },
                { "power": 309, "rate": 217 },
                { "power": 359, "rate": 230 },
                { "power": 412, "rate": 242 },
                { "power": 451, "rate": max_rate }
              ]
            %}
            {% set minPower = map[0             ].power %}
            {% set maxPower = map[map|length - 1].power %}
            {% if tgtPower < minPower %}
              {{ 0 }}
            {% elif tgtPower >= maxPower %}
              {{ max_rate }}
            {% else %}
              {% for i in range(map|length - 1)        %}
                {% set v1 = map[i    ].power           %}
                {% set r1 = map[i    ].rate            %}
                {% set v2 = map[i + 1].power           %}
                {% set r2 = map[i + 1].rate            %}
                {% if v1 <= tgtPower and tgtPower < v2 %}
                  {% set rate = r1 + (r2 - r1) * ((tgtPower - v1) / (v2 - v1)) %}
                    {{ rate|round(0) }}
                {% endif %}
              {% endfor %}
            {% endif %}

          new_rate: "{{ max_rate if empty_batt else max(0, min(max_rate,
                        old_rate + delta if lin_delta|abs < 10 or not is_number(chg_pow) else dir_rate)) }}"
          rate_min: "{{ new_rate < min_rate }}"
          disabled: "{{ states('input_boolean.charge_enabled') == 'off' }}"
          long_on:  "{{ now() - as_datetime(states('input_text.charging_last_turned_on' )) > timedelta(minutes=2) }}"
          long_off: "{{ now() - as_datetime(states('input_text.charging_last_turned_off')) > timedelta(seconds=5) }}"
          long_min: "{{ rate_min and long_on }}"
          turn_off: "{{ disabled or full_batt or disc_ing or long_min }}"
      - if: "{{ turn_off }}"
        then:
          # https://www.home-assistant.io/integrations/switch/
          - service: switch.turn_off
            target:
              entity_id: switch.pm1
          - service: light.turn_off
            target:
              entity_id: light.charge_control
          - condition: numeric_state
            entity_id: sensor.power_charge
            above: 2  # threshold
          - service: input_text.set_value
            data:
              entity_id: input_text.charging_last_turned_off
              value: "{{ now().strftime('%Y-%m-%d %H:%M:%S%z') }}"
        else:  # further actions only if not turning off, and set new rate if needed before maybe turning on
          - if: "{{ new_rate != old_chg }}"
            then:
              # https://www.home-assistant.io/integrations/light/
              - service: light.turn_on  # value 0 would be reported by HA as 'Off'
                target:
                  entity_id: light.charge_control
                data:
                  brightness: "{{ new_rate }}"
          - if: "{{ not charging and long_off }}"
            then:
              - service: switch.turn_on
                target:
                  entity_id: switch.pm1
              - service: input_text.set_value
                data:
                  entity_id: input_text.charging_last_turned_on
                  value: "{{ now().strftime('%Y-%m-%d %H:%M:%S%z') }}"
      - variables:
          last_reason: "{{ states('input_text.charge_reason') }}"
          reason: "{{ 'disabled' if disabled else ('%s battery' % ('full' if is_number(voltage) else 'no')) if full_batt else
                      'still discharging' if disc_ing else 'at min and was charging for > 2 minutes' if long_min else
                      '..' if delta|abs <= 0.5 or new_rate == max_rate else '' }}"
      - service: input_text.set_value
        data:
          entity_id: input_text.charge_reason
          value: "{{ reason }}"
      - condition: "{{ (states('input_boolean.charge_logged') == 'on' and (reason == '' or reason != last_reason)) or empty_batt }}"
      - service: system_log.write
        data:
          message: "{{ 'cons: %4d bal: %+5d charge pow: %3d tgt: %+5d rate old: %3d delta: %+4d dir: %3d new: %3s / %3d%s' %
                    (cons | int(0), balance, chg_pow, tgtPower, old_rate, delta, dir_rate,
                    'off' if turn_off else 'min' if new_rate <= min_rate else
                    'max in emergency: empty battery' if empty_batt else 'max' if new_rate == max_rate else '%3d' % new_rate,
                    max_rate, '' if reason == '' else ' %s' % reason) }}"
          logger: charge
          level: critical  # unfortunately, cannot use 'debug' here as this level is not shown by default

  # control battery discharging with the goal that exactly any missing power is compensated
  - id: control_battery_discharging
    initial_state: true
#   condition: "{{ is_number(number.hm_300_limit_nonpersistent_relative) }}"  # does not work: UndefinedError: 'number' is undefined
    trigger:
#      - platform: state
#        entity_id: sensor.power_balance
#        not_to:  # maybe no more needed
#          - unavailable
      - platform: time_pattern
        seconds: "/13"  # unfortunately, Hoymiles inverter reacts slowly and partly even erratically if changes requested more often
    action:
      - variables:
          threshold: "{{ 2 }}"  # in W for detecting current charging/discharging
          voltage:  "{{ states('sensor.battery_voltage') }}"
          low_batt: "{{ voltage|float(0) < states('input_number.low_batt_v')|float }}"  # if voltage not available, assume low battery, to be on safe side
          # after discharging to some target voltage, voltage recovers, then battery is discharged further where voltage decreases quickly again, etc.
          cons:     "{{ states('sensor.power_consumption') }}"
          charging: "{{ states('sensor.power_charge'   )|float(1) >= threshold }}"
          balance:  "{{ states('input_number.power_balance_avg') }}"
          disc_pow: "{{ states('sensor.power_discharge'        ) }}"
        # prevDisc: "{{ states('sensor.discharge_rate'         ) }}" # the value reported via DTU
          old_disc: "{{states('input_number.discharge_rate'    ) }}" # this is what we actually set
      - condition: "{{ is_number(balance) and is_number(disc_pow) and is_number(old_disc)
                       and states('sensor.hm_300_voltage') != 'unavailable' }}"  # battery is connected

      - variables:
          disc_ing: "{{ disc_pow >= threshold       }}"
          target:   "{{ states('input_number.target_discharge') }}"
        # absolute values for discharge control would be more precise, but Hoymiles latency is way too high when using them
          min_rate: "{{  4 }}"  # percent value for HM-300, min stable would be 3, min preventing "Invalid value" MQTT error is 4
          min_eff:  "{{ 10 }}"  # min percent value for HM-300 where efficiency is considered acceptable (at least some 90%)
          min_pow:  "{{ 25 }}"  # output power corresponding to min_eff limit value, used to prevent on/off oscillation
        # mid_rate: "{{ 20 }}"  # min percent value for HM-300 for which relative limit works rather linearly with factor 3
        # mid_pow:  "{{ 60 }}"  # output power corresponding to mid_rate
        # lin_rate: "{{ 60 }}"  # max percent value for HM-300 for which relative limit works rather linearly with factor 3
        # lin_pow:  "{{180 }}"  # output power corresponding to max_rate
          max_rate: "{{ 75 }}"  # max useful rate
          max_pow:  "{{275 }}"  # output power corresponding to max_rate
        # number.hm_300_limit_{non,}persistent_absolute min values in .storage/core.entity_registry wrong: 10.0; should be < 9.0
          gradient: "{{0.25}}"  # used only for adaptation; value must be suitable at least at min_rate; higher values may lead to overshooting

          # direct approach, based on last charge power
          tgtPower: "{{ disc_pow + balance - target }}"
          dir_rate: >  # map tgtPower directly to rate
            {% set map = [
                { "power": min_pow, "rate":  min_eff },
                { "power":  29, "rate": 11 },
                { "power":  60, "rate": 20 },
                { "power":  91, "rate": 30 },
                { "power": 121, "rate": 40 },
                { "power": 153, "rate": 50 },
                { "power": 182, "rate": 60 },
                { "power": 217, "rate": 65 },
                { "power": 251, "rate": 70 },
                { "power": max_pow, "rate": max_rate }
              ]
            %}
            {% set minPower = map[0             ].power %}
            {% set maxPower = map[map|length - 1].power %}
            {% if tgtPower < minPower %}
              {{ 0 }}
            {% elif tgtPower >= maxPower %}
              {{ max_rate }}
            {% else %}
              {% for i in range(map|length - 1)        %}
                {% set v1 = map[i    ].power           %}
                {% set r1 = map[i    ].rate            %}
                {% set v2 = map[i + 1].power           %}
                {% set r2 = map[i + 1].rate            %}
                {% if v1 <= tgtPower and tgtPower < v2 %}
                  {% set rate = r1 + (r2 - r1) * ((tgtPower - v1) / (v2 - v1)) %}
                    {{ rate|round(0) }}
                {% endif %}
              {% endfor %}
            {% endif %}

        # old_pow : "{{  disc_pow             /            min_pow  *  min_eff             if disc_pow < min_pow else min_eff +
        #               (disc_pow - min_pow)  / (mid_pow - min_pow) * (mid_rate - min_eff) if disc_pow < mid_pow else
        #                disc_pow             /  lin_pow            *  lin_rate            if disc_pow < lin_pow else
        #                lin_rate }}" # rate derived from power, which after a rate change is more realistic than old_disc
        # old_rate: "{{ old_pow|round(0) if is_number(disc_pow) and ((old_disc - old_pow)|abs > 4 or old_disc == min_rate) else old_disc }}"
          old_rate: "{{ old_disc }}"
          lin_delta: "{{ ((balance - target) * gradient) | int }}"
          max_delta: "{{ (max_rate - min_rate) / 1 }}"
          delta:    "{{ 0 if old_rate == min_eff and balance - target <= min_pow else max(-max_delta, min(max_delta, lin_delta)) }}"
          new_rate: "{{ max(min_rate, min(max_rate,
                        (old_rate if disc_ing else min_eff - gradient * min_pow) + delta
                                         if lin_delta|abs < 5 or not is_number(disc_pow) else dir_rate)) }}"
          rate_min: "{{ new_rate <= min_eff }}"
          disabled: "{{ states('input_boolean.discharge_enabled') == 'off' }}"
          turn_off: "{{ disabled or charging or low_batt or rate_min }}"
      - if: "{{ turn_off }}"
        then:
          # perform any changes only when needed
          - if: "{{ disc_ing }}"
            then:
             # https://www.home-assistant.io/integrations/switch/
              - service: button.press
                target:
                  entity_id: button.hm_300_turn_inverter_off
              - service: light.turn_off
                target:
                  entity_id: light.discharge_control # actually just indication
            # workaround for: "Invalid value for number.hm_300_limit_nonpersistent_absolute: 9.0 (range 10.0 - 2250.0)"
          - if: "{{ rate_min and old_rate != min_eff }}"
            then:
              - service: number.set_value
                target:
                  entity_id: number.hm_300_limit_nonpersistent_relative
                data:
                  value: "{{ min_eff }}"
            else:
              - if: "{{ old_rate < min_rate }}"
                then:
                  - service: number.set_value
                    target:
                      entity_id: number.hm_300_limit_nonpersistent_relative
                    data:
                      value: "{{ min_rate }}"
        else:  # further actions only if inverter should not be off
          # set new rate if needed before maybe turning on
          - if: "{{ new_rate != old_disc }}"
            then:
            # https://www.home-assistant.io/integrations/number/
              - service: number.set_value
                target:
                  entity_id: number.hm_300_limit_nonpersistent_relative
                data:
                  value: "{{ new_rate }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.discharge_rate
                data:
                  value: "{{ new_rate }}"
              - service: light.turn_on  # value 0 would be reported by HA as 'Off'
                target:
                  entity_id: light.discharge_control # actually just indication
                data:
                  brightness_pct: "{{ new_rate / max_rate * 100 }}"
          # turn on only when needed
          - if: "{{ not disc_ing }}"
            then:
              # make sure that switch integrated in power meter externally attached to the inverter is on
              - service: switch.turn_on
                target:
                  entity_id: switch.pm2
              - service: button.press
                target:
                  entity_id: button.hm_300_turn_inverter_on
      - variables:
          last_reason: "{{ states('input_text.discharge_reason') }}"
          reason: "{{ 'disabled' if disabled else 'still charging' if charging else
                     ('%s battery' % ('low' if is_number(voltage) else 'no')) if low_batt else 'at min' if rate_min else
                     ('turning inverter off'  if     disc_ing else '') if turn_off else
                      'turning inverter on'   if not disc_ing else '..' if delta|abs <= 0.5 or new_rate == max_rate else '' }}"
      - service: input_text.set_value
        data:
          entity_id: input_text.discharge_reason
          value: "{{ reason }}"
      - condition: "{{ states('input_boolean.discharge_logged') == 'on' and (reason == '' or reason != last_reason) }}"
      - service: system_log.write
        data:
          message: "{{ 'cons: %4d bal: %+5d dischg pow: %3d tgt: %+5d rate old: %3d delta: %+4d dir: %3d new: %3s / %3d%s' %
                       (cons | int(0), balance, disc_pow, tgtPower, old_rate, delta, dir_rate,
                       'off' if turn_off else 'min' if new_rate <= min_rate else 'eff' if new_rate == min_eff else
                       'max' if new_rate == max_rate else '%3d' % new_rate, max_rate,
                        '' if reason == '' else ' %s' % reason) }}"
                  # {{ 'prevDisc %s' % prevDisc }} {{ 'vs. old_disc %s' % old_disc }} {{ 'old_pow %s' % old_pow }} {{ 'old_rate %s' % old_rate }}"
          logger: dischg
          level: critical  # unfortunately, cannot use 'debug' here as this level is not shown by default

  # overall control of charge vs. discharge depending on sun elevation, battery SoC, power consumption, and PV production
  - id: situation
    initial_state: true
    trigger:
      - platform: state
        entity_id: sun.sun
        attribute: elevation
      - platform: state
        entity_id: sensor.battery_soc  # may be unavailable
    action:
      - condition:     "{{ states('input_boolean.situation_enabled') == 'on' }}"
      - variables:
          charge_sum : "{{ states('sensor.energy_charge_sum'   )             }}"
          dischg_sum : "{{ states('sensor.energy_discharge_sum')             }}"
      - condition:     "{{ is_number(charge_sum) and is_number(dischg_sum)   }}"
      - if           : "{{ not is_number(states('sensor.battery_voltage'))   }}"
        then:
          - delay: "00:00:01"  # give voltage sensor a fair chance to come up after quick reload

      - variables:
          next_setting: "{{ as_timestamp(states('sensor.sun_next_setting'))       }}"
          to_sunset   : "{{ (next_setting - as_timestamp(now())) / 3600           }}"  # number of hours until next sunset
          ele         : "{{ state_attr('sun.sun', 'elevation')                    }}"
          sun_is_up   : "{{ ele|float(99) > 1                                     }}"  # if ele not available, assume sun is up
          prod_hour   : "{{ states('sensor.energy_current_hour'              )    }}"  # based on forecast
          prod_remain : "{{ states('sensor.energy_production_today_remaining')    }}"  # based on forecast
          prod_to_come: "{{ prod_remain - prod_hour                               }}"  # production from now based on forecast
          prod_today  : "{{ states('sensor.energy_production_today'          )    }}"  # based on forecast
          prod_tomorrow: "{{ states('sensor.energy_production_tomorrow'      )    }}"  # based on forecast
          prod_fc     : "{{ prod_today - prod_to_come                             }}"  # production until now based on forecast
          prod_actual : "{{ states('sensor.energy_production_daily')              }}"  # production until now actually
          default_cal : "{{ 0.50                                                  }}"  # forecast tends to be way too optimistic - why?
          calibration : "{{ default_cal if prod_fc == 0 else prod_actual|float(0) / prod_fc }}"
          avg_expected: "{{ 0 if to_sunset == 0 else
                            1000 * prod_to_come / to_sunset * calibration         }}"
          min_load   : "{{ 37 }}"
          avg_excess : "{{ not is_number(prod_actual) or avg_expected > min_load  }}"  # on average, excess expected
          may_excess : "{{ sun_is_up and (true or avg_excess)                     }}"  # excess still possible today; surely not from sunset to sunrise

          volt       : "{{ states('sensor.battery_voltage') }}"
          soc        : "{{ states('sensor.battery_soc'    ) }}"
          empty_batt : "{{ volt|float(100) <  states('input_number.empty_batt_v')|float }}"  # if voltage not available, assume no emergency
          low_soc    : "{{                    states('input_number.low_batt_soc'  )|int }}"
          low_batt   : "{{  soc|float(0)   <                       low_soc              }}"  # if SoC not available, assume low battery
          part_soc   : "{{                    states('input_number.part_batt_soc' )|int }}"
          part_full  : "{{  soc|float(0)   >                       part_soc             }}"  # if SoC not available, do not assume at least partly full
          near_full  : "{{  soc|float(0)   >= states('input_number.near_batt_soc' )|int }}"  # if SoC not available, do not assume nearly full
          full_batt  : "{{  soc|float(0)   >= states('input_number.full_batt_soc' )|int }}"  # if SoC not available, do not assume full battery
          # need to use '|float' or '|int' above - see https://github.com/home-assistant/home-assistant.io/issues/30992
        # need significant hysteresis for battery voltage because it drops quickly after switching from charge to discharge

          cons       : "{{ states('sensor.power_consumption') }}"
          prod       : "{{ states('sensor.power_production' ) }}"
          excess     : "{{ sun_is_up and is_number(cons) and prod|float(0) - cons|float(0) > 0 }}"

          capacity   : "{{ states('input_number.battery_capacity')|int }}"
          avg_dayprod: "{{ 1.224 }}"                                                   # average  PV  production per day in kWh
          avg_owncons: "{{ 0.761 }}"                                                   # average own consumption per day in kWh
          next_midnight  : "{{ as_timestamp(states('sensor.sun_next_midnight'))   }}"
          before_midnight: "{{ (next_midnight - as_timestamp(now())) / 3600 < 12  }}"
          prod_next  : "{{ (prod_tomorrow if before_midnight else prod_today)
                           if is_number(prod_today) and is_number(prod_tomorrow) else avg_dayprod }}"
          expect_prod: "{{ prod_next * default_cal                                }}"  # based on forecast, defaulting to average daily production
          efficiency : "{{ states('input_number.storage_efficiency')|float        }}"
          expect_chg : "{{ max(0, expect_prod - avg_owncons) * 1000
                           * efficiency / capacity * 100                          }}"  # energy in Wh expected to be added to the battery charge today
          tgt_soc    : "{{ max(low_soc, part_soc - expect_chg)                    }}"  # target battery SoC to reach by sunrise, for at least partial SoC during day
          tgt_dischg : "{{ max(0, (soc|float(100) - tgt_soc) / 100 * capacity)    }}"  # if SoC not avaialable, assume full
          tgt_hours  : >                                                   # likely hours of discharge to reach target SoC by sunrise, based on typical consumption
            {% set map = [
                { "energy":    0, "hour":  0 },
                { "energy":  100, "hour":  1 },
                { "energy":  640, "hour":  8 },
                { "energy": 1000, "hour": 10 },
                { "energy": 2000, "hour": 16 }
              ] %}
            {% set minEnergy = map[0             ].energy %}
            {% set maxEnergy = map[map|length - 1].energy %}
            {% if tgt_dischg < minEnergy %}
              0
            {% elif tgt_dischg >= maxEnergy %}
              25
            {% else %}
              {% for i in range(map|length - 1)  %}
                {% set e1 = map[i    ].energy    %}
                {% set h1 = map[i    ].hour      %}
                {% set e2 = map[i + 1].energy    %}
                {% set h2 = map[i + 1].hour      %}
                {% if e1 <= tgt_dischg and tgt_dischg < e2 %}
                  {% set hour = h1 + (h2 - h1) * ((tgt_dischg - e1) / (e2 - e1)) %}
                    {{ hour|round(1) }}
                {% endif %}
              {% endfor %}
            {% endif %}
          next_rising: "{{ as_timestamp(states('sensor.sun_next_rising')) }}"
          to_sunrise : "{{ (next_rising - as_timestamp(now())) / 3600     }}"  # number of hours until next sunrise
          should_dis : "{{ part_full or tgt_hours >= to_sunrise           }}"  # should discharge towards partial SoC or to reach low_batt by sunrise

          batt_status : "{{ states('input_text.battery_status') }}"
          time_soc    : "{{ '%s,%s' % (now().strftime('%Y-%m-%d %H:%M:%S'), batt_status) }}"
          dis_last   : "{{ states('input_number.energy_discharge_last') }}"
          chg_last   : "{{ states('input_number.energy_charge_last'   ) }}"
          dis_diff   : "{{ dischg_sum - dis_last|float(0) }}"
          chg_diff   : "{{ charge_sum - chg_last|float(0) }}"
          chg_reason : "{{ 'emergency: empty battery' if empty_batt else 'low battery' if low_batt else 'excess PV power and not nearly full' }}"
          dis_reason : "{{ 'full battery' if may_excess else 'no excess expected' }}"
          situation  : "{{ states('input_select.situation') }}"

      # 'any' is the initial situation after HA restart; 'any' remains while may_excess (during day) until low battery, excess, or full battery
      - if: "{{ situation != 'charge' and (empty_batt or low_batt or (excess and not near_full)) }}"
        # note that is_number(dischg_sum), which prevents wrong situation change or diff value after restarting HA
        then:
          - service: input_select.select_option
            target:
              entity_id: input_select.situation
            data:
              option: charge
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.discharge_enabled
        # would be nice to prevent inverter from needlessly draining the battery on standby, but would need a switch also on battery side
        # - service: switch.turn_off
        #   target:
        #     entity_id: switch.pm2
        # - service: light.turn_off
        #   target:
        #     entity_id: light.discharge_control

        # - if: "{{ disc_ing }}"
        #   then:
        #     - delay: "00:01:00"  # give battery some rest, such that voltage settles
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.charge_enabled
          - condition: "{{ situation != 'any' }}"
          - service: notify.battery_data
            data_template:
              message: "{{ '%s,0    ,%5.3f,charge-only,%s' % (time_soc, dis_diff, chg_reason) }}"
          - service: system_log.write
            data:
              message: "{{ 'switching to charge-only mode after discharging %.3f kWh due to %s' % (dis_diff, chg_reason) }}"
              # for some reason, need to use '|float(0)' - see https://github.com/home-assistant/home-assistant.io/issues/30992
              logger: situation
              level: critical
          - service: input_number.set_value
            target:
              entity_id: input_number.energy_discharge_last
            data:
              value: "{{ dischg_sum }}"
      - if: "{{ situation != 'discharge' and not low_batt and (not may_excess or full_batt) }}"
        # note that is_number(charge_sum), which prevents wrong situation change or diff value after restarting HA
        # when battery full, switch to discharge-only mode as long as it is still nearly full, with hysteresis (see above)
        then:
          - service: input_select.select_option
            target:
              entity_id: input_select.situation
            data:
              option: discharge
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.charge_enabled
        # - if: "{{ charging }}"
        #   then:
        #     - delay: "00:01:00"  # give battery some rest, such that voltage settles
          # input_boolean.discharge_enabled is handled further below
          - condition: "{{ situation != 'any' }}"
          - service: notify.battery_data
            data_template:
              message: "{{ '%s,%5.3f,0    ,dischg-only,%s' % (time_soc, chg_diff, dis_reason) }}"
          - service: system_log.write
            data:
              message: "{{ 'switching to discharge-only mode after charging %.3f kWh due to %s' % (chg_diff, dis_reason) }}"
              logger: situation
              level: critical
          - service: input_number.set_value
            target:
              entity_id: input_number.energy_charge_last
            data:
              value: "{{ charge_sum }}"
      - if: "{{ states('input_select.situation') != 'charge' and is_number(soc) }}"
        then:
          if: "{{ (may_excess and near_full) or should_dis }}"
          then:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.discharge_enabled
          else:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.discharge_enabled
          # would be nice to prevent inverter from needlessly draining the battery on standby, but would need a switch also on battery side
          # - service: switch.turn_off
          #   target:
          #     entity_id: switch.pm2
          # - service: light.turn_off
          #   target:
          #     entity_id: light.discharge_control
      - condition: "{{ states('input_boolean.situation_logged') == 'on' }}"
      - service: system_log.write
        data:
          message: "{{ 'sun elevation: %+5.1f°, expected avg power: %s W and SoC gain: %2d %%; battery %s, %s hours of discharge to %s %%' %
                        (ele, '%3d' % avg_expected if is_number(prod_actual) else '  ?', expect_chg, batt_status,
                        '%4.1f' % tgt_hours if is_number(soc ) else ' ?  ',
                        '%2d'   % tgt_soc   if is_number(soc ) else ' ?'  ) }},
                    {{ 'mode: ' }}{{ states('input_select.situation') }}{{
                       '' if states('input_select.situation') != 'discharge' or not is_number(soc) else
                       ', %s' % ('excess possible and battery nearly full' if may_excess and near_full else
                                 'should discharge now %s' % ('towards partial SoC' if part_full else 'to reach low before sunrise')
                                 if should_dis else ('should wait for %scharging' % ('dis' if soc > tgt_soc|float(50) else ''))) }}"
          logger: situation
          level: critical  # unfortunately, cannot use 'debug' here as this level is not shown by default

input_select:
  situation:
    # unique_id: situation_id
    name: major mode
    options:
      - charge
      - any
      - discharge
    initial: any
    icon: mdi:battery-charging-40
