# defining the inputs before the automations such that they can be modified without restarting HA
# https://www.home-assistant.io/integrations/input_boolean/
# input_* does not allow setting a unique_id - bug report https://github.com/home-assistant/core/issues/109741
input_boolean:
  charge_enabled:
    name: Charge enabled
    # unique_id: charge_enabled_id
    initial: "on"
    icon: mdi:battery-arrow-up-outline
  charge_logged:
    name: Charge logged
    # unique_id: charge_logged_id
    icon: mdi:battery-arrow-up-outline
  discharge_enabled:
    name: Discharge enabled
    # unique_id: discharge_enabled_id
    initial: "on"
    icon: mdi:battery-arrow-down-outline
  discharge_logged:
    name: Discharge logged
    # unique_id: discharge_logged_id
    icon: mdi:battery-arrow-down-outline

  situation_enabled:
    name: Situation enabled
    # unique_id: situation_enabled_id
    initial: "on"
    icon: mdi:state-machine
  situation_logged:
    name: Situation logged
    # unique_id: situation_logged_id
    initial: "on"

input_number:
  target_charge:
    name: Target balance for charging
    initial: 10
    min: -50
    max: 550
    step: 10
    icon: mdi:battery-arrow-up-outline
  target_discharge:
    name: Target balance for discharging
    initial: 20
    min: -250
    max: 250
    step: 10
    icon: mdi:battery-arrow-down-outline

  energy_charge_last:
    name: Last charge energy
    min: 0
    max: 999999
    mode: box
  energy_discharge_last:
    name: Last discharge energy
    min: 0
    max: 999999
    mode: box

  power_balance_avg2:
    name: Power Balance Rolling Average
    initial: 0
    min: -999999
    max: +999999
    mode: box

  power_balance_avg:
    name: Power Balance Rolling Average
    initial: 0
    min: -999999
    max: +999999
    mode: box

  discharge_rate:
    name: Inverter limit last set for discharging
    initial: 0
    min: 0
    max: 100

